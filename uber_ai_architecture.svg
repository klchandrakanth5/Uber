  <rect x="68" y="510" width="220" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
  <text x="178" y="531" text-anchor="middle" font-size="13" font-weight="bold" fill="#fac775" font-family="sans-serif">Leaflet.js live map</text>
